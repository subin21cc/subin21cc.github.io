{%- comment -%} Overrides the theme default so the favicon uses the single image in `site.favicon`. {%- endcomment -%}
{% assign favicon_url = site.favicon | relative_url %}

<link rel="icon" type="image/png" href="{{ favicon_url }}">
<link rel="shortcut icon" href="{{ favicon_url }}">
<link rel="apple-touch-icon" href="{{ favicon_url }}">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ '/assets/img/favicons/site.webmanifest' | relative_url }}">
{% endif %}
